services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portail_api
    env_file: ./backend/.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edefence_net

  postgres:
    image: postgres:16-alpine
    env_file: ./backend/.env
    environment:
      POSTGRES_DB: edefence_portail
      POSTGRES_USER: ${POSTGRES_USER:-edefence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-edefence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - edefence_net

volumes:
  postgres_data:

networks:
  edefence_net:
    external: true
    name: edefence_net
