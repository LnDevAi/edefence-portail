# HTTP — redirect vers HTTPS + challenge certbot
server {
    listen 80;
    server_name edefence.tech www.edefence.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name edefence.tech www.edefence.tech;

    ssl_certificate     /etc/letsencrypt/live/edefence.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edefence.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /var/www/html;
    index edefence_portail.html;

    # Fichiers statiques
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /includes/ {
        expires 1h;
    }

    location = /admin {
        try_files /admin.html =404;
    }

    # API backend
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://api:8000/health;
    }

    # Portail principal
    location / {
        try_files $uri $uri/ /edefence_portail.html;
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
