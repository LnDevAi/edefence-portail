# Config initiale HTTP uniquement (avant obtention du certificat Let's Encrypt)
# Remplacée par edefence.conf après "certbot certonly"
server {
    listen 80;
    server_name edefence.tech www.edefence.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /var/www/html;
    index edefence_portail.html;

    location /assets/ { }
    location /includes/ { }
    location = /admin { try_files /admin.html =404; }

    location /api/ {
        proxy_pass       http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /edefence_portail.html;
    }
}
