name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  audit-scripts:
    name: Audit Scripts — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt --quiet; fi
          pip install ruff mypy pytest pytest-cov --quiet

      - name: Lint (ruff)
        run: ruff check . --output-format=github || true

      - name: Format check (ruff)
        run: ruff format --check . || true

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports || true

      - name: Test (pytest)
        run: pytest --tb=short -q || true
